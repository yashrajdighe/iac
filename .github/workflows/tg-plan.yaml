---
name: "Terragrunt GitHub Actions Plan"
run-name: ${{ github.actor }}-running-tg-plan-for-${{ github.sha }}
on:
  pull_request:
    branches:
      - main
    paths:
      - "terragrunt/**"
      - "modules/**"
      - ".github/workflows/tg-plan.yaml"
      - ".github/workflows/tg-apply.yaml"

concurrency:
  group: terraform
  cancel-in-progress: false

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  id-token: write # This is required for requesting the JWT
  contents: read # This is required for actions/checkout
  pull-requests: write # This is required for the tg-comment action

jobs:
  tg-plan:
    uses: yashrajdighe/github-actions-reusable-workflows/.github/workflows/tg-plan.yaml@main
    with:
      runs_on: self-hosted
      disable_terragrunt_init_parallelism_one: true
      enable_oidc_debugger: false
      role_to_assume: ${{ vars.TERRAFORM_IAM_ROLE }}
      workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER_RO }}
      service_account: ${{ vars.GCP_SERVICE_ACCOUNT_RO }}
      working_directory: "terragrunt/infrastructure"
      tofu_version: "1.8.1"
      tg_version: "0.67.0"
    secrets: inherit
